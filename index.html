<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#B4CDEA" />
    <meta name="description" content="中国省级制霸标记工具：点亮去过的省，用 ?l= 分享状态。" />
    <title>cn-ex · 中国制霸</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <strong>cn-ex</strong>
        <span class="tag">中国制霸</span>
      </div>
      <nav class="actions">
        <button type="button" id="btn-copy" class="btn">复制链接</button>
        <button type="button" id="btn-save" class="btn btn-primary">保存图片</button>
        <button type="button" id="btn-reset" class="btn btn-ghost">清空</button>
      </nav>
    </header>

    <main class="stage">
      <div id="map-host" class="map-host" aria-label="地图"></div>

      <aside id="picker" class="picker" hidden role="dialog" aria-label="设置等级">
        <div class="picker-head">
          <div class="picker-title">@<span id="picker-name">地区</span></div>
          <div class="picker-icons">
            <a id="picker-search" class="picker-icon search" href="#" target="_blank" rel="noreferrer" title="搜索该地区" aria-label="搜索">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </a>
            <button type="button" id="picker-close" class="picker-icon close" title="关闭" aria-label="关闭">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.89 18.3 9.17 12 2.89 5.71 4.3 4.29l6.29 6.3 6.29-6.3z"/></svg>
            </button>
          </div>
        </div>
        <div class="picker-list" role="listbox">
          <button type="button" data-level="5" class="picker-item lv-5" role="option">居住（居住过）</button>
          <button type="button" data-level="4" class="picker-item lv-4" role="option">短居（住宿过）</button>
          <button type="button" data-level="3" class="picker-item lv-3" role="option">游玩（游玩过）</button>
          <button type="button" data-level="2" class="picker-item lv-2" role="option">落脚（休息、换车等）</button>
          <button type="button" data-level="1" class="picker-item lv-1" role="option">路过（路过）</button>
          <button type="button" data-level="0" class="picker-item lv-0" role="option">没去过</button>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <p>
        体验参考
        <a href="https://zhung.com.tw/japanex/" target="_blank" rel="noreferrer">JapanEx</a>
        · 状态可用
        <code>?l=</code>
        分享
      </p>
      <p class="hint" id="status-hint">标记会写入地址栏与本地存储</p>
    </footer>

    <div id="toast" class="toast" hidden></div>

    <div id="export-modal" class="modal" hidden>
      <div class="modal-card">
        <img id="export-img" alt="导出预览" />
        <p>手机可长按图片保存</p>
        <div class="modal-actions">
          <a id="export-download" class="btn btn-primary" download="cn-ex.png">下载 PNG</a>
          <button type="button" id="export-close" class="btn">关闭</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
